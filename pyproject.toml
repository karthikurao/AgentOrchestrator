[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",   # line length handled by formatter
    "E741",   # ambiguous variable name (e.g. l, O)
    "B008",   # function call in default arg (used by LangChain @tool)
    "UP007",  # X | Y union syntax (keep for clarity)
    "SIM108", # ternary operator suggestion
    "N818",   # exception name suffix
    "F841",   # unused variable (false positives in try/except patterns)
    "RUF005", # collection literal concatenation
    "RUF012", # mutable class default
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011", "SIM300"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
